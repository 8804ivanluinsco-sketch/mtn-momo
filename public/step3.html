
<!DOCTYPE html>
<html>

<head>
    <title>Step 3</title>

    <!-- MOBILE + NO ZOOM -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
        <img src="yas-removebg-preview.png" alt="" />
      </div>

<div class="container">

    <h2 class="title">Next of Kin</h2>

    <!-- NAMES -->
    <input id="kfname" placeholder="First Name" 
        pattern="[A-Za-z]+" title="Only letters allowed" required>

    <input id="klname" placeholder="Last Name" 
        pattern="[A-Za-z]+" title="Only letters allowed" required>

    <!-- PHONE -->
    <input id="kphone" value="+263" placeholder="Phone Number" 
        pattern="^\+2637[0-9]{8}$" title="Enter valid Zimbabwe number">

    <!-- PROVINCE -->
    <select id="province" required>
        <option value="">Select Province</option>
        <option>Harare</option>
        <option>Bulawayo</option>
        <option>Manicaland</option>
        <option>Mashonaland East</option>
        <option>Mashonaland West</option>
        <option>Masvingo</option>
        <option>Midlands</option>
    </select>

    <!-- EXTRA FIELDS (NOT SUBMITTED) -->
    <input placeholder="Relationship to Applicant">
    <input placeholder="Employer (Optional)">
    <input placeholder="Monthly Income (Optional)">

    <p id="errorBox" style="color:red; text-align:center; display:none;"></p>

    <button onclick="nextStep3()">Next</button>

</div>

<div class="footer"></div>

<script>
function nextStep3() {
    const kfname = document.getElementById("kfname").value.trim();
    const klname = document.getElementById("klname").value.trim();
    const kphone = document.getElementById("kphone").value.trim();
    const province = document.getElementById("province").value;

    const nameRegex = /^[A-Za-z]+$/;
    const phoneRegex = /^\+2637[0-9]{8}$/;

    if (!kfname || !klname || !kphone || province === "") {
        showError("Please fill all required fields");
        return;
    }

    if (!nameRegex.test(kfname) || !nameRegex.test(klname)) {
        showError("Names must contain only letters");
        return;
    }

    if (!phoneRegex.test(kphone)) {
        showError("Enter valid Zimbabwe phone (+2637XXXXXXXX)");
        return;
    }

    // SAVE ONLY REQUIRED DATA
    localStorage.setItem("kfname", kfname);
    localStorage.setItem("klname", klname);
    localStorage.setItem("kinName", kfname + " " + klname);
    localStorage.setItem("kphone", kphone);
    localStorage.setItem("province", province);

    showLoaderAndGo("step4.html");
    }
</script>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("loaded");
});
</script>

<div id="pageLoader" class="loader" style="display:none;"></div>

</body>
</html>
